<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>myHistory UI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="top">
      <!-- 左：Eventレーン（縦スクロール） -->
      <div class="scroll" id="eventScroll" aria-label="Event lane">
        <div class="event-rows" id="eventRows">
          <!-- app.js が描画 -->
        </div>
      </div>

      <!-- 右：因果レーン群（横スクロール） -->
      <div class="lanes-scroll" id="lanesScroll" aria-label="Causal lanes container">
        <div class="lanes" id="lanes">
          <!-- app.js が描画 -->
        </div>
      </div>
    </div>

    <div class="panel" role="region" aria-label="Bottom control panel">
      <div class="panel-group" role="group" aria-label="IO controls">
        <button id="btnSave" type="button">保存</button>
        <button id="btnLoad" type="button">読込</button>
        <input type="file" id="fileInput" accept=".json" style="display:none" />
      </div>
      <div class="panel-group" role="group" aria-label="Analysis">
        <button id="btnStats" type="button">統計</button>
      </div>

      <div class="status" id="statusText" aria-live="polite">読み込み中…</div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
