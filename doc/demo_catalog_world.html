<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>世界史 ― レーン表示</title>
<style>
  :root {
    --bg: #f0ebe0;
    --paper: #fffdf8;
    --ink: #28231e;
    --muted: #6a6058;
    --line: #c9b89e;
    --accent: #5c3d1e;
    --shadow: 0 6px 20px rgba(40,28,14,.08);
    --block-w: 280px;
    --block-radius: 12px;
    --lane-gap: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
    background: linear-gradient(160deg, #f5efe3 0%, #ede5d5 100%);
    color: var(--ink);
    min-height: 100vh;
  }
  .page { max-width: 1600px; margin: 0 auto; padding: 24px 20px 80px; }
  .header { margin-bottom: 12px; border-left: 4px solid var(--accent); padding-left: 16px; }
  h1 { font-size: 22px; color: var(--accent); letter-spacing: .06em; }
  .sub { margin-top: 3px; font-size: 12px; color: var(--muted); }

  /* Controls */
  .controls {
    display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center;
  }
  .controls button {
    font-family: inherit; font-size: 11px; padding: 4px 10px;
    border: 1.5px solid var(--line); border-radius: 18px;
    background: var(--paper); color: var(--muted); cursor: pointer; transition: all .2s;
  }
  .controls button:hover, .controls button.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .ctrl-info { font-size: 11px; color: var(--muted); margin-left: auto; }

  .controls-row2 {
    display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; align-items: center;
  }
  .controls-row2 .sep { width: 1px; height: 18px; background: var(--line); margin: 0 3px; }
  .domain-btn {
    font-family: inherit; font-size: 10px; padding: 3px 8px;
    border: 1.5px solid var(--line); border-radius: 14px;
    background: var(--paper); color: var(--muted); cursor: pointer; transition: all .2s;
    font-weight: 600;
  }
  .domain-btn:hover { background: #e8e0d8; }
  .domain-btn.active { color: #fff; border-color: transparent; }
  .fwtype-btn {
    font-family: inherit; font-size: 10px; padding: 2px 7px;
    border: 1.5px solid var(--line); border-radius: 12px;
    background: var(--paper); color: var(--muted); cursor: pointer; transition: all .2s;
  }
  .fwtype-btn:hover { opacity: 0.8; }
  .fwtype-btn.active { color: #fff; border-color: transparent; }

  /* Region toggle buttons */
  .region-btn {
    font-family: inherit; font-size: 11px; padding: 4px 12px;
    border: 2px solid var(--line); border-radius: 18px;
    background: var(--paper); color: var(--muted); cursor: pointer; transition: all .2s;
    font-weight: 600;
  }
  .region-btn.active { border-color: var(--accent); color: var(--accent); background: #f5efe8; }
  .region-btn:hover { border-color: var(--accent); }

  /* Legend */
  .legend-float {
    position: sticky; top: 0; z-index: 100;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 12px; padding: 8px 14px;
    box-shadow: var(--shadow); margin-bottom: 10px;
  }
  .legend-float.collapsed { display: none; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 10px; color: var(--muted); }
  .legend + .legend { margin-top: 4px; }
  .legend-item { display: flex; align-items: center; gap: 3px; }

  /* ── Lane Layout ── */
  .lane-headers {
    display: grid; gap: var(--lane-gap); margin-bottom: 8px; margin-left: 28px;
    position: sticky; top: 0; z-index: 50; background: linear-gradient(160deg, #f5efe3 0%, #ede5d5 100%);
    padding-top: 4px; padding-bottom: 4px;
  }
  .lane-header {
    text-align: center; font-size: 14px; font-weight: 700;
    padding: 8px 12px; border-radius: 10px;
    background: var(--paper); border: 1.5px solid var(--line);
    box-shadow: var(--shadow);
  }
  .lane-header .lane-count { font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 6px; }

  .lane-container { position: relative; }

  /* Era band */
  .era-band {
    display: flex; gap: var(--lane-gap); margin-bottom: 6px;
    border-bottom: 1px solid rgba(200,188,168,.2); padding-bottom: 8px;
  }
  .era-band-label {
    writing-mode: vertical-rl; text-orientation: mixed;
    font-size: 11px; font-weight: 700; color: var(--accent);
    padding: 8px 4px; background: rgba(92,61,30,.06);
    border-radius: 8px; text-align: center;
    min-width: 24px; letter-spacing: .1em;
  }
  .era-band-lanes { display: flex; gap: var(--lane-gap); flex: 1; }
  .era-lane-col {
    flex: 1 1 0; min-width: var(--block-w); max-width: 400px;
    display: flex; flex-direction: column; gap: 16px; padding: 4px 0;
  }

  /* ── SVG overlay (cross-region overrides) ── */
  #edge-svg { z-index: 10; }
  .edge-line.cross { stroke: #e8a060; opacity: 0.55; stroke-width: 1.8; stroke-dasharray: 8 4; }
  .edge-head.cross { fill: #e8a060; opacity: 0.6; }
  .edge-dot.cross  { fill: #e8a060; opacity: 0.6; }

  /* Cluster header */
  .cluster-header {
    font-size: 11px; font-weight: 700; color: var(--accent);
    padding: 4px 10px; background: rgba(255,253,248,.85);
    border: 1px solid var(--line); border-radius: 10px;
    text-align: center;
  }

  /* ── Block (compact overrides for lane layout) ── */
  .block { width: 100%; }
  .block.hl { filter: brightness(0.97); }
  .block.source-hl { box-shadow: 0 0 0 6px rgba(200,150,10,.4); transform: scale(1.02); transition: all .15s; }
  .block.dim { opacity: 0.15; }
  .block-body { padding: 8px 10px 20px; gap: 4px; }
  .block-inner { padding: 4px 6px; gap: 4px; min-height: 24px; border-radius: 8px; }
  .block-inner.empty { min-height: 20px; font-size: 9px; }
  .ref-chip { font-size: 9px; padding: 1px 5px; border-radius: 8px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
  .ref-chip b { font-size: 9px; }
  /* Compact size overrides */
  .block-label { font-size: 12px; line-height: 1.5; }
  .block-summary { font-size: 10px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .block-abstract { margin-top: 2px; padding-top: 3px; }
  .block-pattern { font-size: 10px; line-height: 1.4; }
  .block-actors { gap: 2px; }
  .actor { font-size: 8px; padding: 0 5px; border-radius: 8px; }
  .actor.active { background: #4a4038; color: #f5f0e8; border-color: #4a4038; }
  .block-id { bottom: 3px; right: 8px; font-size: 10px; }
  .block-fw-label { bottom: 3px; left: 8px; font-size: 10px; }
  .block-era { font-size: 10px; margin-bottom: 1px; }
  .block-out { gap: 3px; }
  .out-chip { font-size: 8px; padding: 0 5px; border-radius: 8px; }

  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
  .empty-lane {
    min-height: 40px; border: 1px dashed #e0d8cc; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #d0c4b0; font-size: 9px;
  }

  @media (max-width: 1200px) { :root { --block-w: 240px; } }
  @media (max-width: 840px) { :root { --block-w: 100%; } .era-lane-col { max-width: 100%; } }

</style>
</head>
<body>
<div class="page">
  <nav id="page-nav"></nav>
  <div class="header">
    <h1>世界史</h1>
    <p class="sub" id="subtitle">EnergyAbsモデル ― 4文明圏レーン表示</p>
  </div>
  <div class="controls">
    <button class="active" onclick="resetView(this)">全表示</button>
    <button onclick="filterRole('amplifies',this)">増幅</button>
    <button onclick="filterRole('triggers',this)">発火</button>
    <button onclick="filterRole('transforms',this)">変換</button>
    <button onclick="filterRole('sustains',this)">維持</button>
    <button onclick="toggleLegend()" id="legend-btn" style="margin-left:auto">凡例 ▶</button>
    <span class="ctrl-info" id="info"></span>
  </div>
  <div class="controls-row2" id="controls-row2"></div>
  <div class="legend-float collapsed" id="legend-panel">
    <div class="legend">
      <div class="legend-item" style="border-left: 2px solid #ddd; padding-left: 6px;">▶ エッジ:</div>
      <div class="legend-item"><span style="color:#c8960a; font-weight:600">▶</span> 圧↑</div>
      <div class="legend-item"><span style="color:#c45a3c; font-weight:600">▶</span> 引き金</div>
      <div class="legend-item"><span style="color:#3a6a9a; font-weight:600">▶</span> 変換</div>
      <div class="legend-item"><span style="color:#3a8a3a; font-weight:600">▶</span> 基盤</div>
      <div class="legend-item"><span style="color:#7a3a8a; font-weight:600">▶</span> 抑制</div>
      <div class="legend-item"><span style="color:#3a7a8a; font-weight:600">▶</span> 継承</div>
    </div>
    <div class="legend">
      <div class="legend-item" style="border-left: 2px solid #ddd; padding-left: 6px;">枠色 = FW型:</div>
      <div class="legend-item"><span style="color:#c45a3c">⚔</span> 武力衝突</div>
      <div class="legend-item"><span style="color:#c8960a">▲</span> 対立蓄積</div>
      <div class="legend-item"><span style="color:#8a3a3a">⊘</span> 崩壊</div>
      <div class="legend-item"><span style="color:#3a6a9a">■</span> 制度化</div>
      <div class="legend-item"><span style="color:#6a3a8a">◆</span> 権力確立</div>
      <div class="legend-item"><span style="color:#c47a3a">⚡</span> 外生衝撃</div>
      <div class="legend-item"><span style="color:#5a8a5a">〜</span> 漸進変化</div>
      <div class="legend-item"><span style="color:#3a7a8a">✦</span> 改革</div>
    </div>
    <div class="legend">
      <div class="legend-item" style="border-left: 2px solid #ddd; padding-left: 6px;">━━ 橙破線 = クロスリージョンエッジ</div>
    </div>
  </div>

  <div id="main-area">
    <div class="loading" id="loading">データ読み込み中…</div>
  </div>
</div>

<script src="shared.js"></script>
<script>
// ══════════════════════════════════════════════
// Data sources
// ══════════════════════════════════════════════
const DATA_SOURCES = [
  { url: '../data/energyabs_europe_v1.json', region: 'europe', label: '欧州', prefix: 'W', color: '#5c6a8a' },
  { url: '../data/energyabs_middleeast_v1.json', region: 'middleeast', label: '中東', prefix: 'M', color: '#8a6a3a' },
  { url: '../data/energyabs_india_v1.json', region: 'india', label: 'インド', prefix: 'I', color: '#3a8a6a' },
  { url: '../data/energyabs_china_v1.json', region: 'china', label: '中国', prefix: 'C', color: '#c45a3c' },
  { url: '../data/energyabs_americas_v1.json', region: 'americas', label: 'アメリカ', prefix: 'A', color: '#6a3a8a' },
  { url: '../data/energyabs_v2.json', region: 'japan', label: '日本', prefix: 'N', color: '#c43c6a' },
];

let G = { nodes: [], edges: [] };
let NM = {};
let EbyTo = {};
let EbyFrom = {};
let regions = [];
let regionMap = {};
let PATTERN_INDEX = {}; // node_id -> [P-IDs]
let selectedNode = null;

const SEMANTIC_DOMAINS = {
  '地面': { types: ['drift', 'institution', 'collapse'], colorSolid: '#8b7750' },
  '力学': { types: ['conflict', 'battle', 'power'], colorSolid: '#c45a3c' },
  '意図': { types: ['reform'], colorSolid: '#3a7a8a' },
  '外部': { types: ['shock'], colorSolid: '#c47a3a' },
};

// ── Era parsing ──
function parseEraYear(era) {
  if (!era) return 9999;
  const bcMatch = era.match(/前(\d+)/);
  if (bcMatch) return -parseInt(bcMatch[1]);
  const adMatch = era.match(/(\d{3,4})/);
  if (adMatch) return parseInt(adMatch[1]);
  return 9999;
}

const ERA_BANDS = [
  { label: '古代', min: -4000, max: -500 },
  { label: '古典', min: -500, max: 500 },
  { label: '後古典', min: 500, max: 1000 },
  { label: '中世', min: 1000, max: 1500 },
  { label: '近世', min: 1500, max: 1800 },
  { label: '近代', min: 1800, max: 1945 },
  { label: '現代', min: 1945, max: 2100 },
];

function getRegion(nid) {
  return regionMap[nid.charAt(0)] || null;
}

function fmtId(nid) {
  return nid.replace(/^[NWMICA]/, '');
}

function edgeKey(e) {
  return e.id || `${e.from}-${e.to}`;
}

// ══════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════
async function init() {
  const [results] = await Promise.all([
    Promise.allSettled(
      DATA_SOURCES.map(async src => {
        const res = await fetch(src.url);
        if (!res.ok) throw new Error(`${res.status}`);
        return { ...src, data: await res.json() };
      })
    ),
    buildPatternIds()
  ]);

  // Load pattern index
  try {
    const piRes = await fetch('../data/pattern_index.json');
    if (piRes.ok) {
      const pi = await piRes.json();
      PATTERN_INDEX = pi.nodeIndex || {};
    }
  } catch(e) {}

  results.forEach(r => {
    if (r.status !== 'fulfilled') return;
    const { data, ...info } = r.value;
    regions.push(info);
    regionMap[info.prefix] = info;
    data.nodes.forEach(n => {
      n._region = info.region;
      G.nodes.push(n);
      NM[n.id] = n;
    });
    data.edges.forEach(e => {
      const fr = getRegion(e.from), tr = getRegion(e.to);
      e._cross = fr && tr && fr.region !== tr.region;
      G.edges.push(e);
      (EbyTo[e.to] = EbyTo[e.to] || []).push(e);
      (EbyFrom[e.from] = EbyFrom[e.from] || []).push(e);
    });
  });

  if (G.nodes.length === 0) {
    document.getElementById('loading').textContent = 'データを読み込めませんでした';
    return;
  }

  G.nodes.sort((a, b) => parseEraYear(a.era) - parseEraYear(b.era));

  document.getElementById('info').textContent =
    `${regions.map(r => r.label).join('・')} — ${G.nodes.length} nodes / ${G.edges.length} edges`;
  document.getElementById('subtitle').textContent =
    `EnergyAbsモデル ― ${regions.map(r => r.label).join('・')} ${G.nodes.length}ノード ${G.edges.length}エッジ`;

  blockOpts.nodeMap = NM;
  buildControlsRow2();
  renderLanes();
}

function buildControlsRow2() {
  const row = document.getElementById('controls-row2');
  let html = '';
  regions.forEach(r => {
    html += `<button class="region-btn active" data-region="${r.region}" onclick="toggleRegion('${r.region}',this)" style="border-color:${r.color};color:${r.color}">${r.label}</button>`;
  });
  html += '<div class="sep"></div>';
  Object.entries(SEMANTIC_DOMAINS).forEach(([name, d]) => {
    html += `<button class="domain-btn" onclick="filterDomain('${name}',this)" style="border-color:${d.colorSolid}">${name}</button>`;
  });
  html += '<div class="sep"></div>';
  Object.entries(FW_TYPE_STYLES).forEach(([type, s]) => {
    html += `<button class="fwtype-btn" onclick="filterFwType('${type}',this)" style="border-color:${s.color}">${s.shape} ${s.label}</button>`;
  });
  row.innerHTML = html;
}

// ══════════════════════════════════════════════
// Render lanes
// ══════════════════════════════════════════════
let activeRegions = new Set();

function renderLanes() {
  activeRegions = new Set(regions.map(r => r.region));
  renderLanesInner();
}

function renderLanesInner() {
  const area = document.getElementById('main-area');
  const activeRegs = regions.filter(r => activeRegions.has(r.region));

  // Group nodes by era band × region
  const bandData = ERA_BANDS.map(band => {
    const regionNodes = {};
    activeRegs.forEach(r => {
      regionNodes[r.region] = G.nodes.filter(n =>
        n._region === r.region &&
        parseEraYear(n.era) >= band.min &&
        parseEraYear(n.era) < band.max
      );
    });
    const total = Object.values(regionNodes).reduce((s, arr) => s + arr.length, 0);
    return { band, regionNodes, total };
  }).filter(bd => bd.total > 0);

  let html = '';

  // Sticky lane headers
  html += `<div class="lane-headers" style="grid-template-columns:repeat(${activeRegs.length}, minmax(var(--block-w), 1fr));">`;
  activeRegs.forEach(r => {
    const count = G.nodes.filter(n => n._region === r.region).length;
    html += `<div class="lane-header" style="border-color:${r.color}">${r.label}<span class="lane-count">${count}</span></div>`;
  });
  html += '</div>';

  // Canvas
  html += '<div class="lane-container" id="canvas">';
  html += '<svg id="edge-svg"></svg>';

  bandData.forEach(({ band, regionNodes }) => {
    html += '<div class="era-band">';
    html += `<div class="era-band-label">${band.label}</div>`;

    // CSS Grid layout: shared rows ensure cross-lane time alignment
    // 1. Collect all nodes across regions, sorted by year
    const allEntries = [];
    activeRegs.forEach((r, ci) => {
      (regionNodes[r.region] || []).slice()
        .sort((a, b) => parseEraYear(a.era) - parseEraYear(b.era))
        .forEach(n => {
          allEntries.push({ year: parseEraYear(n.era), colIdx: ci, node: n });
        });
    });
    allEntries.sort((a, b) => a.year - b.year || a.colIdx - b.colIdx);

    if (allEntries.length === 0) { html += '</div>'; return; }

    // 2. Group into time slots (±20 year tolerance)
    const TOLERANCE = 20;
    const slots = [];
    allEntries.forEach(entry => {
      const last = slots[slots.length - 1];
      if (last && Math.abs(entry.year - last.year) <= TOLERANCE) {
        last.entries.push(entry);
      } else {
        slots.push({ year: entry.year, entries: [entry] });
      }
    });

    // 3. Build grid-template-rows: [spacer, content] pairs
    const dataRange = Math.max(1, slots[slots.length - 1].year - slots[0].year);
    const pxPerYear = Math.max(0.1, Math.min(2.0, slots.length * 40 / dataRange));
    const rowDefs = [];
    const slotRowIdx = [];

    slots.forEach((slot, si) => {
      if (si > 0) {
        const gapYears = slot.year - slots[si - 1].year;
        const gapPx = Math.round(Math.max(0, gapYears * pxPerYear));
        if (gapPx > 2) {
          rowDefs.push(`${gapPx}px`);
        }
      }
      slotRowIdx.push(rowDefs.length);
      rowDefs.push('auto');
    });

    html += `<div class="era-band-grid" style="display:grid; grid-template-columns:repeat(${activeRegs.length}, minmax(var(--block-w), 1fr)); grid-template-rows:${rowDefs.join(' ')}; column-gap:var(--lane-gap); align-items:start;">`;

    // 4. Place nodes into grid cells
    slots.forEach((slot, si) => {
      const row = slotRowIdx[si] + 1; // CSS grid is 1-based
      const byCols = {};
      slot.entries.forEach(e => {
        if (!byCols[e.colIdx]) byCols[e.colIdx] = [];
        byCols[e.colIdx].push(e.node);
      });

      Object.entries(byCols).forEach(([colIdx, nodes]) => {
        html += `<div style="grid-column:${parseInt(colIdx) + 1}; grid-row:${row};">`;
        nodes.forEach(n => { html += renderBlock(n); });
        html += '</div>';
      });
    });

    html += '</div></div>';
  });

  html += '</div>';
  area.innerHTML = html;

  document.querySelectorAll('.block').forEach(el => {
    el.addEventListener('click', evt => {
      if (evt.target.closest('.ref-chip') || evt.target.closest('.out-chip')) return;
      toggleSelect(el.dataset.nid);
    });
  });

  // Draw edges after layout settles; redraw on resize
  requestAnimationFrame(() => {
    drawEdges();
    // Redraw again after a short delay to catch late-layout blocks
    setTimeout(drawEdges, 300);
  });
  if (!window._resizeObserverSet) {
    window._resizeObserverSet = true;
    new ResizeObserver(() => requestAnimationFrame(drawEdges))
      .observe(document.getElementById('canvas'));
  }
}

const blockOpts = {
  nodeMap: null, // set after init
  chipMaxLen: 12,
  showAbsorbed: true,
  showOutgoing: true,
  showPatternLink: true,
  onChipClick: 'flashAndScroll',
  onChipHover: true,
  onActorClick: 'toggleActor',
  crossHighlight: e => e._cross,
};

function renderBlock(n) {
  const incoming = EbyTo[n.id] || [];
  const outgoing = EbyFrom[n.id] || [];
  const fwStyle = FW_TYPE_STYLES[n.fwType] || { color: '#b8a898', shape: '?', label: '?' };

  let html = `<div class="block" data-nid="${n.id}" id="blk-${n.id}" data-fwtype="${n.fwType || ''}" data-region="${n._region || ''}" style="border-color:${fwStyle.color}">`;
  html += `<div class="block-body">${renderBlockHTML(n, incoming, outgoing, blockOpts)}</div>`;
  html += renderBlockFooter(n, { showPatternLink: true });
  html += '</div>';
  return html;
}

// ══════════════════════════════════════════════
// SVG Edge Drawing (delegates to shared.js)
// ══════════════════════════════════════════════
function drawEdges() {
  const svg = document.getElementById('edge-svg');
  const canvas = document.getElementById('canvas');
  if (!svg || !canvas) return;
  // Build blockEls map from DOM
  const blockElMap = {};
  G.nodes.forEach(n => {
    const el = document.getElementById('blk-' + n.id);
    if (el) blockElMap[n.id] = el;
  });
  drawEdgesStandard(G.edges, blockElMap, canvas, svg);
}

// ══════════════════════════════════════════════
// Interactions
// ══════════════════════════════════════════════
function toggleSelect(nid) {
  if (selectedNode === nid) { selectedNode = null; clearHighlights(); return; }
  selectedNode = nid;
  highlightNode(nid);
}

function highlightNode(nid) {
  const connected = new Set([nid]);
  const connEdges = new Set();
  G.edges.forEach(e => {
    if (e.from === nid || e.to === nid) {
      connected.add(e.from); connected.add(e.to);
      connEdges.add(edgeKey(e));
    }
  });
  document.querySelectorAll('.block').forEach(el => {
    el.classList.toggle('dim', !connected.has(el.dataset.nid));
    el.classList.toggle('hl', el.dataset.nid === nid);
  });
  applyEdgeDim(connEdges);
  const node = NM[nid];
  document.getElementById('info').textContent = `${node.label} — ${(EbyTo[nid]||[]).length}入 / ${(EbyFrom[nid]||[]).length}出`;
}

function clearHighlights() {
  document.querySelectorAll('.block').forEach(el => { el.classList.remove('dim', 'hl'); });
  document.querySelectorAll(EDGE_SEL).forEach(el => { el.classList.remove('hl', 'dim'); });
  document.getElementById('info').textContent = `${G.nodes.length} nodes / ${G.edges.length} edges`;
}

function filterRole(role, btn) {
  setActiveBtn(btn);
  const eids = new Set(), nids = new Set();
  G.edges.forEach(e => {
    if (e.role === role) { eids.add(edgeKey(e)); nids.add(e.from); nids.add(e.to); }
  });
  document.querySelectorAll('.block').forEach(el => { el.classList.toggle('dim', !nids.has(el.dataset.nid)); });
  applyEdgeDim(eids);
  document.getElementById('info').textContent = `${role}: ${eids.size} edges / ${nids.size} nodes`;
}

function resetView(btn) { setActiveBtn(btn); selectedNode = null; clearHighlights(); }

function setActiveBtn(btn) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleLegend() {
  const p = document.getElementById('legend-panel');
  p.classList.toggle('collapsed');
  document.getElementById('legend-btn').textContent = p.classList.contains('collapsed') ? '凡例 ▶' : '凡例';
}

function toggleRegion(region, btn) {
  if (activeRegions.has(region)) {
    if (activeRegions.size <= 1) return;
    activeRegions.delete(region);
    btn.classList.remove('active');
  } else {
    activeRegions.add(region);
    btn.classList.add('active');
  }
  renderLanesInner();
}

function filterDomain(name, btn) {
  const d = SEMANTIC_DOMAINS[name];
  if (!d) return;
  const types = new Set(d.types);
  const matchIds = new Set(G.nodes.filter(n => types.has(n.fwType)).map(n => n.id));
  const connEdges = new Set();
  G.edges.forEach(e => { if (matchIds.has(e.from) || matchIds.has(e.to)) connEdges.add(edgeKey(e)); });
  document.querySelectorAll('.block').forEach(el => { el.classList.toggle('dim', !matchIds.has(el.dataset.nid)); });
  applyEdgeDim(connEdges);
  document.querySelectorAll('.domain-btn').forEach(b => { b.classList.remove('active'); b.style.background = ''; });
  btn.classList.add('active'); btn.style.background = d.colorSolid;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.fwtype-btn').forEach(b => { b.classList.remove('active'); b.style.background = ''; });
  document.getElementById('info').textContent = `${name}: ${matchIds.size} nodes`;
}

function filterFwType(type, btn) {
  const matchIds = new Set(G.nodes.filter(n => n.fwType === type).map(n => n.id));
  const connEdges = new Set();
  G.edges.forEach(e => { if (matchIds.has(e.from) || matchIds.has(e.to)) connEdges.add(edgeKey(e)); });
  document.querySelectorAll('.block').forEach(el => { el.classList.toggle('dim', !matchIds.has(el.dataset.nid)); });
  applyEdgeDim(connEdges);
  const s = FW_TYPE_STYLES[type];
  document.querySelectorAll('.fwtype-btn').forEach(b => { b.classList.remove('active'); b.style.background = ''; });
  btn.classList.add('active'); btn.style.background = s.color;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.domain-btn').forEach(b => { b.classList.remove('active'); b.style.background = ''; });
  document.getElementById('info').textContent = `${s.shape} ${s.label}: ${matchIds.size} nodes`;
}

let activeActor = null;
function toggleActor(name) {
  if (activeActor === name) {
    activeActor = null; clearHighlights();
    document.querySelectorAll('.actor.active').forEach(el => el.classList.remove('active'));
    return;
  }
  activeActor = name;
  document.querySelectorAll('.actor').forEach(el => { el.classList.toggle('active', el.textContent === name); });
  const matchIds = new Set(G.nodes.filter(n => n.actors && n.actors.includes(name)).map(n => n.id));
  const connEdges = new Set();
  G.edges.forEach(e => { if (matchIds.has(e.from) && matchIds.has(e.to)) connEdges.add(edgeKey(e)); });
  document.querySelectorAll('.block').forEach(el => { el.classList.toggle('dim', !matchIds.has(el.dataset.nid)); });
  applyEdgeDim(connEdges);
  document.getElementById('info').textContent = `${name}: ${matchIds.size} nodes`;
}

function applyEdgeDim(visibleIds) {
  document.querySelectorAll(EDGE_SEL).forEach(el => {
    const vis = visibleIds.has(el.dataset.eid);
    el.classList.toggle('dim', !vis);
    if (el.classList.contains('edge-line')) el.classList.toggle('hl', vis);
  });
}

window.addEventListener('resize', () => requestAnimationFrame(drawEdges));

init();
</script>
</body>
</html>
