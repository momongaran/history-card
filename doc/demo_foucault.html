<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>監獄の誕生 ― 規律権力の系譜学（55ノード・72エッジ）</title>
<style>
  :root {
    --bg: #f0ebe0;
    --paper: #fffdf8;
    --ink: #28231e;
    --muted: #6a6058;
    --line: #c9b89e;
    --accent: #4a3040;
    --shadow: 0 6px 20px rgba(40,28,14,.08);
    --block-w: 380px;
    --block-radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
    background: linear-gradient(160deg, #f5efe3 0%, #ede5d5 100%);
    color: var(--ink);
    min-height: 100vh;
  }
  .page { max-width: 1600px; margin: 0 auto; padding: 24px 20px 80px; }
  .header { margin-bottom: 12px; border-left: 4px solid var(--accent); padding-left: 16px; }
  h1 { font-size: 22px; color: var(--accent); letter-spacing: .06em; }
  .sub { margin-top: 3px; font-size: 12px; color: var(--muted); }

  /* Page-specific: scale filter buttons */
  .scale-filters { display: flex; gap: 6px; margin-left: 12px; padding-left: 12px; border-left: 2px solid var(--line); }
  .scale-btn {
    font-family: inherit; font-size: 11px; padding: 3px 10px;
    border: 1.5px solid var(--line); border-radius: 12px;
    background: var(--paper); color: var(--muted); cursor: pointer; transition: all .2s;
  }
  .scale-btn:hover { opacity: 0.8; }
  .scale-btn.active { color: #fff; }
  .scale-btn[data-scale="body"].active { background: #5c3020; border-color: #5c3020; }
  .scale-btn[data-scale="org"].active { background: #3d5a3e; border-color: #3d5a3e; }
  .scale-btn[data-scale="society"].active { background: #1a3a5c; border-color: #1a3a5c; }

  /* Page-specific: scale badge */
  .scale-badge {
    font-size: 9px; padding: 1px 6px; border-radius: 8px;
    color: #fff; font-weight: 600; letter-spacing: .05em;
  }
  .scale-badge.body { background: #5c3020; }
  .scale-badge.org { background: #3d5a3e; }
  .scale-badge.society { background: #1a3a5c; }

  /* Page-specific: hl color override */
  .block.hl { box-shadow: 0 0 0 5px rgba(74,48,64,.25); }

  /* Legend */
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: var(--muted);
    margin-bottom: 16px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-sw { width: 28px; height: 3px; border-radius: 2px; }

  /* Comparison section */
  .comparison {
    margin-top: 32px; padding: 20px; background: var(--paper);
    border-radius: 14px; border: 1px solid var(--line);
  }
  .comparison h2 { font-size: 16px; color: var(--accent); margin-bottom: 12px; }
  .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .comp-box { padding: 12px; border-radius: 10px; border: 1px solid #e0d8cc; }
  .comp-box h3 { font-size: 13px; color: var(--ink); margin-bottom: 8px; }
  .comp-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 11px; }
  .comp-bar { height: 14px; border-radius: 4px; min-width: 2px; }
  .comp-label { color: var(--muted); min-width: 80px; }
  .comp-count { font-weight: 700; color: var(--ink); min-width: 24px; text-align: right; }
  .overlap-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 8px; background: #e8f0e8; color: #3a6a3a; font-weight: 600; }
  .unique-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 8px; background: #f0e8e8; color: #6a3a3a; font-weight: 600; }
  .comp-summary { margin-top: 16px; padding: 12px; background: rgba(74,48,64,.04); border-radius: 10px; font-size: 12px; line-height: 1.7; color: var(--muted); }
  .comp-summary strong { color: var(--ink); }

  @media (max-width: 840px) {
    :root { --block-w: 100%; }
    .block { max-width: 460px; }
    .comp-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">
  <nav id="page-nav"></nav>
  <div class="header">
    <h1>監獄の誕生 ― 規律権力の系譜学</h1>
    <p class="sub">M. フーコー『監獄の誕生』(1975) の権力論を因果フレームで再構成 ― 55ノード・72エッジ</p>
    <p class="sub">君主権力（身体刑）→ 規律権力（監視・規格化・試験）→ カルセラル連続体（社会全体の規律化）</p>
  </div>

  <div class="controls">
    <button class="active" onclick="resetView(this)">全表示</button>
    <button onclick="filterRole('amplifies',this)">amplifies</button>
    <button onclick="filterRole('triggers',this)">triggers</button>
    <button onclick="filterRole('transforms',this)">transforms</button>
    <button onclick="filterRole('sustains',this)">sustains</button>
    <div class="scale-filters">
      <button class="scale-btn active" data-scale="all" onclick="filterScale('all',this)">全スケール</button>
      <button class="scale-btn" data-scale="body" onclick="filterScale('body',this)">身体</button>
      <button class="scale-btn" data-scale="org" onclick="filterScale('org',this)">組織</button>
      <button class="scale-btn" data-scale="society" onclick="filterScale('society',this)">社会</button>
    </div>
    <span class="ctrl-info" id="info">15ノード / 20エッジ</span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-sw" style="background:#6a3a8a"></div>power</div>
    <div class="legend-item"><div class="legend-sw" style="background:#c8960a"></div>conflict</div>
    <div class="legend-item"><div class="legend-sw" style="background:#3a7a8a"></div>reform</div>
    <div class="legend-item"><div class="legend-sw" style="background:#3a6a9a"></div>institution</div>
    <div class="legend-item"><div class="legend-sw" style="background:#5a8a5a"></div>drift</div>
    <span style="margin-left: 16px; border-left: 2px solid #ddd; padding-left: 12px;">エッジ:</span>
    <div class="legend-item"><div class="legend-sw" style="background:#c45a3c"></div>triggers</div>
    <div class="legend-item"><div class="legend-sw" style="background:#c8960a"></div>amplifies</div>
    <div class="legend-item"><div class="legend-sw" style="background:#3a6a9a"></div>transforms</div>
    <div class="legend-item"><div class="legend-sw" style="background:#3a8a3a"></div>sustains</div>
  </div>

  <div class="canvas" id="canvas">
    <svg id="edge-svg"></svg>
  </div>

  <div class="comparison" id="comparison"></div>
</div>

<script src="shared.js"></script>
<script>
// ===================== DATA =====================
let DATA = null;
let PL_DATA = null; // Pattern Language for comparison

async function loadData() {
  const [res1, res2] = await Promise.all([
    fetch('../data/foucault_discipline_v1.json'),
    fetch('../data/pattern_language_sample.json')
  ]);
  const json1 = await res1.json();
  const json2 = await res2.json();
  DATA = { nodes: json1.nodes, edges: json1.edges };
  PL_DATA = { nodes: json2.nodes, edges: json2.edges };
  buildGraph();
  buildComparison();
}

// ===================== LAYOUT =====================
// 書籍の4部構成に沿って配置
const LAYOUT = [
  // Part 1: 身体刑
  ["FC01", "FC02", "FC03"],
  ["FC04", "FC05", "FC06"],
  // Part 2: 刑罰改革
  ["FC07", "FC08", "FC09"],
  ["FC10", "FC11", "FC12"],
  ["FC13"],
  // Part 3: 規律 — 従順な身体
  ["FC14", "FC15", "FC16"],
  ["FC17", "FC18", "FC19"],
  ["FC20", "FC21", "FC22", "FC23"],
  // Part 3: 規律 — 正しい訓育の手段
  ["FC24", "FC25", "FC26"],
  ["FC27", "FC28", "FC29", "FC30"],
  // Part 3: パノプティコン
  ["FC31", "FC32", "FC33"],
  ["FC34", "FC35"],
  // Part 3: 規律の波及
  ["FC36", "FC37", "FC38", "FC39"],
  ["FC40", "FC41"],
  // Part 4: 監獄
  ["FC42", "FC43", "FC44"],
  ["FC45", "FC46", "FC47"],
  ["FC48", "FC49", "FC50"],
  ["FC51", "FC52", "FC53"],
  ["FC54", "FC55"]
];

const SCALE_MAP = {};
// Auto-assign from data


const SCALE_LABELS = { body: '身体', org: '組織', society: '社会' };

let nodeMap = {};
let _inEdges = {};
let _outEdges = {};
const canvasEl = document.getElementById('canvas');
const svgEl = document.getElementById('edge-svg');
const blockEls = {};

const blockOpts = {
  nodeMap: null,
  chipMaxLen: 10,
  emptyLabel: '（起点）',
  eraBadge: n => {
    const sc = SCALE_MAP[n.id] || 'society';
    const sl = SCALE_LABELS[sc] || '';
    return `<span class="scale-badge ${sc}">${sl}</span><span style="font-size:11px;font-weight:400;color:var(--muted)">${n.era}</span>`;
  },
  onChipClick: 'flashAndScroll',
  onChipHover: true,
};

function buildGraph() {
  nodeMap = {};
  DATA.nodes.forEach(n => {
    nodeMap[n.id] = n;
    const s = (n.scale || 'society').replace('社会','society').replace('組織','org').replace('身体','body');
    SCALE_MAP[n.id] = s;
  });
  blockOpts.nodeMap = nodeMap;
  _inEdges = {}; _outEdges = {};
  DATA.nodes.forEach(n => { _inEdges[n.id] = []; _outEdges[n.id] = []; });
  DATA.edges.forEach(e => { _inEdges[e.to].push(e); _outEdges[e.from].push(e); });

  document.getElementById('info').textContent = `${DATA.nodes.length}ノード / ${DATA.edges.length}エッジ`;

  LAYOUT.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'block-row';
    row.forEach(id => {
      const n = nodeMap[id];
      if (!n) return;
      const block = document.createElement('div');
      block.className = 'block';
      block.dataset.id = id;
      block.dataset.scale = SCALE_MAP[id] || 'society';
      block.id = 'blk-' + id;
      block.style.borderColor = (FW_TYPE_STYLES[n.fwType] || {}).color || '#b8a898';

      block.innerHTML = `<div class="block-body">${renderBlockHTML(n, _inEdges[id], _outEdges[id], blockOpts)}</div>${renderBlockFooter(n)}`;
      block.addEventListener('click', () => toggleHighlight(id));
      blockEls[id] = block;
      rowEl.appendChild(block);
    });
    canvasEl.appendChild(rowEl);
  });

  requestAnimationFrame(drawEdges);
}

function drawEdges() {
  drawEdgesStandard(DATA.edges, blockEls, canvasEl, svgEl);
}

// ===================== HIGHLIGHT =====================
let hlId = null;
function toggleHighlight(id) {
  if (hlId === id) { hlId = null; resetView(document.querySelector('.controls button')); return; }
  hlId = id;
  const connected = new Set([id]);
  DATA.edges.forEach(e => {
    if (e.from === id) connected.add(e.to);
    if (e.to === id) connected.add(e.from);
  });
  Object.entries(blockEls).forEach(([bid, el]) => {
    el.classList.toggle('hl', bid === id);
    el.classList.toggle('dim', !connected.has(bid));
  });
  document.querySelectorAll(EDGE_SEL).forEach(el => {
    const hit = el.dataset.from === id || el.dataset.to === id;
    el.classList.toggle('hl', hit);
    el.classList.toggle('dim', !hit);
  });
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
}

function resetView(btn) {
  hlId = null;
  Object.values(blockEls).forEach(el => { el.classList.remove('hl', 'dim'); el.style.display = ''; });
  document.querySelectorAll(EDGE_SEL).forEach(el => { el.classList.remove('hl', 'dim'); });
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.scale-btn[data-scale="all"]').classList.add('active');
  if (btn) btn.classList.add('active');
}

function filterRole(role, btn) {
  hlId = null;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const involved = new Set();
  DATA.edges.forEach(e => { if (e.role === role) { involved.add(e.from); involved.add(e.to); } });
  Object.entries(blockEls).forEach(([id, el]) => {
    el.classList.toggle('dim', !involved.has(id)); el.classList.remove('hl');
  });
  document.querySelectorAll(EDGE_SEL).forEach(el => {
    const hit = el.dataset.role === role;
    el.classList.toggle('hl', hit); el.classList.toggle('dim', !hit);
  });
}

function filterScale(scale, btn) {
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (scale === 'all') {
    Object.values(blockEls).forEach(el => { el.classList.remove('dim'); el.style.display = ''; });
    document.querySelectorAll(EDGE_SEL).forEach(el => el.classList.remove('dim'));
    return;
  }
  const inScale = new Set();
  Object.entries(SCALE_MAP).forEach(([id, s]) => { if (s === scale) inScale.add(id); });
  Object.entries(blockEls).forEach(([id, el]) => {
    el.classList.toggle('dim', !inScale.has(id)); el.classList.remove('hl');
  });
  document.querySelectorAll(EDGE_SEL).forEach(el => {
    const hit = inScale.has(el.dataset.from) || inScale.has(el.dataset.to);
    el.classList.toggle('dim', !hit); el.classList.remove('hl');
  });
}

// ===================== COMPARISON =====================
function buildComparison() {
  const norm = t => (PAT_SYNONYMS[t] || t || '?');

  function getPatterns(nodes) {
    const fwMap = {};
    const bgMap = {};
    const patMap = {};
    nodes.forEach(n => {
      fwMap[n.fwType] = (fwMap[n.fwType] || 0) + 1;
      const bg = norm(n.bgType || '?');
      bgMap[bg] = (bgMap[bg] || 0) + 1;
      const rel = n.releaseType ? norm(n.releaseType) : null;
      const pk = rel && rel !== bg ? bg + '→' + rel : bg;
      patMap[pk] = (patMap[pk] || 0) + 1;
    });
    return { fwMap, bgMap, patMap };
  }

  const fc = getPatterns(DATA.nodes);
  const pl = getPatterns(PL_DATA.nodes);

  // fwType comparison
  const allFw = new Set([...Object.keys(fc.fwMap), ...Object.keys(pl.fwMap)]);
  const fwOverlap = [...allFw].filter(k => fc.fwMap[k] && pl.fwMap[k]);

  // bgType comparison
  const allBg = new Set([...Object.keys(fc.bgMap), ...Object.keys(pl.bgMap)]);
  const bgOverlap = [...allBg].filter(k => fc.bgMap[k] && pl.bgMap[k]);

  // pattern key comparison
  const allPat = new Set([...Object.keys(fc.patMap), ...Object.keys(pl.patMap)]);
  const patOverlap = [...allPat].filter(k => fc.patMap[k] && pl.patMap[k]);
  const fcOnly = [...allPat].filter(k => fc.patMap[k] && !pl.patMap[k]);
  const plOnly = [...allPat].filter(k => !fc.patMap[k] && pl.patMap[k]);

  const fwColors = {
    drift: '#5a8a5a', conflict: '#c8960a', institution: '#3a6a9a',
    battle: '#c45a3c', collapse: '#8a3a3a', power: '#6a3a8a',
    reform: '#3a7a8a', shock: '#c47a3a'
  };

  function barRow(label, fcVal, plVal, maxVal, color) {
    const fcW = Math.round(fcVal / maxVal * 120);
    const plW = Math.round(plVal / maxVal * 120);
    return `<div class="comp-row">
      <span class="comp-label">${label}</span>
      <span class="comp-count">${fcVal}</span>
      <span class="comp-bar" style="width:${fcW}px;background:${color || '#4a3040'}"></span>
      <span style="color:#ccc;font-size:10px">|</span>
      <span class="comp-bar" style="width:${plW}px;background:${color || '#3a5c3a'}"></span>
      <span class="comp-count">${plVal}</span>
    </div>`;
  }

  const maxFw = Math.max(...Object.values(fc.fwMap), ...Object.values(pl.fwMap), 1);

  let fwHtml = '';
  [...allFw].sort().forEach(fw => {
    const c = fwColors[fw] || '#999';
    fwHtml += barRow(fw, fc.fwMap[fw] || 0, pl.fwMap[fw] || 0, maxFw, c);
  });

  let patHtml = '';
  patOverlap.sort().forEach(p => {
    patHtml += `<div class="comp-row"><span class="overlap-badge">${p}</span> <span style="font-size:10px;color:var(--muted)">監獄 ${fc.patMap[p]} / PL ${pl.patMap[p]}</span></div>`;
  });
  if (patOverlap.length === 0) patHtml = '<div style="font-size:11px;color:var(--muted)">完全一致するパターンキーなし</div>';

  let fcOnlyHtml = fcOnly.sort().map(p => `<span class="unique-badge">${p}</span>`).join(' ');
  let plOnlyHtml = plOnly.sort().map(p => `<span class="unique-badge" style="background:#e8e8f0;color:#3a3a6a">${p}</span>`).join(' ');

  const el = document.getElementById('comparison');
  el.innerHTML = `
    <h2>パターン比較: 監獄の誕生 vs パターン・ランゲージ</h2>
    <div class="comp-grid">
      <div class="comp-box">
        <h3>fwType分布 <span style="font-size:10px;font-weight:400;color:var(--muted)">（左=監獄 / 右=PL）</span></h3>
        ${fwHtml}
      </div>
      <div class="comp-box">
        <h3>共通パターンキー <span style="font-size:10px;font-weight:400;color:var(--muted)">（bgType→releaseType正規化後）</span></h3>
        ${patHtml}
        <div style="margin-top:8px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">監獄のみ（${fcOnly.length}種）:</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">${fcOnlyHtml}</div>
        </div>
        <div style="margin-top:8px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">PLのみ（${plOnly.length}種）:</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">${plOnlyHtml}</div>
        </div>
      </div>
    </div>
    <div class="comp-summary">
      <strong>共通fwType:</strong> ${fwOverlap.length}/${allFw.size}種（${fwOverlap.join(', ')}）<br>
      <strong>共通bgType:</strong> ${bgOverlap.length}/${allBg.size}種（${bgOverlap.join(', ')}）<br>
      <strong>共通パターンキー:</strong> ${patOverlap.length}/${allPat.size}種<br>
      <strong>解釈:</strong> 両テキストは異なる対象（権力の系譜学 vs 空間の質）を扱うが、
      fwTypeレベルでは${fwOverlap.length}種が共通し、同じ因果メカニズム（制度化・漸進変化・権力確立・改革）が
      まったく異なる領域で再現されている。パターンキーの一致は
      「背景圧→結果」の組み合わせがドメイン横断的に共有されることを示す。
    </div>
  `;
}

// ===================== RESIZE =====================
window.addEventListener('resize', () => requestAnimationFrame(drawEdges));

// ===================== BOOT =====================
loadData();
</script>
</body>
</html>
