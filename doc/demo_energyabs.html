<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EnergyAbs Flow — 磐井の乱から律令国家志向の消滅まで</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap');
  :root {
    --bg: #f5f0e8; --paper: #fffdf8; --ink: #1a1a1a;
    --muted: #6a5a48; --line: #d0c8b8; --accent: #3a2a18;
    --amp: #b8860b; --trg: #b83030; --tfm: #2060b0;
    --sus: #2a8a48; --sup: #6b7280; --inh: #6848a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif JP', -apple-system, serif;
    background: linear-gradient(160deg, #f5efe3, #ede5d5);
    color: var(--ink); min-height: 100vh;
  }
  .header {
    padding: 16px 24px; border-bottom: 1px solid var(--line);
    background: rgba(255,253,248,.95);
  }
  h1 { font-size: 22px; color: var(--accent); letter-spacing: .04em; }
  .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Controls */
  .controls {
    padding: 8px 24px; background: rgba(255,253,248,.9);
    border-bottom: 1px solid var(--line);
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    font-size: 12px;
  }
  .controls label { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 3px 8px; border-radius: 12px; border: 1px solid #e0d8c8; }
  .controls label:hover { background: #f0e8d8; }
  .controls label input { display: none; }
  .controls label.active { border-color: #8a7a60; background: #f0e8d0; }
  .legend-dot { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }
  .stats { margin-left: auto; color: var(--muted); font-size: 11px; }

  /* Graph */
  .graph-wrap { overflow: auto; padding: 24px; }
  .graph { position: relative; min-width: 1300px; }
  .cluster-row {
    display: flex; align-items: flex-start;
    margin-bottom: 24px; position: relative;
  }
  .cluster-label {
    width: 140px; min-width: 140px; padding: 8px 10px 8px 0;
    font-size: 12px; color: var(--muted); line-height: 1.5;
    border-right: 3px solid #c8b898; margin-right: 16px; text-align: right;
  }
  .cluster-label .cl-era { font-size: 10px; color: #9a8a78; display: block; margin-top: 2px; }
  .cluster-nodes { display: flex; gap: 12px; flex-wrap: wrap; flex: 1; padding: 4px 0; }

  /* Node card */
  .node {
    width: 188px; min-height: 72px; background: var(--paper);
    border: 1.5px solid var(--line); border-radius: 10px;
    padding: 8px 10px 22px; cursor: pointer;
    transition: all .15s; position: relative;
  }
  .node:hover { border-color: #8a7a60; box-shadow: 0 4px 16px rgba(0,0,0,.1); transform: translateY(-1px); }
  .node.hl { border-color: var(--tfm); box-shadow: 0 0 0 2px rgba(32,96,176,.25); }
  .node.dim { opacity: .25; }
  .node.event { border-left: 3px solid var(--trg); }
  .node-era { font-size: 9px; color: #9a8a78; margin-bottom: 3px; letter-spacing: .02em; }
  .node-label { font-size: 12px; line-height: 1.45; color: #2a2218; font-weight: 600; }
  .node-pattern { font-size: 10px; color: var(--tfm); margin-top: 4px; border-top: 1px dotted #e0d8c8; padding-top: 3px; }
  .node-id {
    position: absolute; bottom: 4px; right: 7px;
    font-size: 9px; color: #b8a890; font-family: monospace;
  }
  .node-int {
    position: absolute; top: 6px; right: 7px;
    width: 7px; height: 7px; border-radius: 50%;
  }
  .node-int.high { background: #d04040; }
  .node-int.medium { background: #c89820; }
  .node-int.low { background: #50a050; }

  /* SVG edges */
  svg.edge-layer {
    position: absolute; top: 0; left: 0;
    pointer-events: none; overflow: visible;
  }
  .edge { fill: none; stroke-width: 1.5; opacity: .35; transition: all .15s; }
  .edge.hl { opacity: 1; stroke-width: 2.5; }
  .edge.dim { opacity: .06; }
  .edge.amplifies { stroke: var(--amp); }
  .edge.triggers { stroke: var(--trg); }
  .edge.transforms { stroke: var(--tfm); }
  .edge.sustains { stroke: var(--sus); }
  .edge.suppresses { stroke: var(--sup); }
  .edge.inherits { stroke: var(--inh); }

  /* Tooltip */
  .tooltip {
    position: fixed; z-index: 200;
    background: rgba(255,253,248,.97); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    max-width: 340px; display: none; pointer-events: none;
  }
  .tooltip.show { display: block; }
  .tooltip h4 { font-size: 14px; margin-bottom: 6px; color: var(--accent); }
  .tooltip .t-summary { font-size: 12px; line-height: 1.6; color: #4a3a28; margin-bottom: 8px; }
  .tooltip .t-actors { font-size: 11px; color: var(--muted); }
  .tooltip .t-edges { font-size: 11px; color: var(--muted); margin-top: 6px; border-top: 1px solid #e8e0d0; padding-top: 6px; }
  .tooltip .t-edge-item { padding: 2px 0; }
  .tooltip .t-role { font-weight: 700; }
  .t-role.amplifies { color: var(--amp); }
  .t-role.triggers { color: var(--trg); }
  .t-role.transforms { color: var(--tfm); }
  .t-role.sustains { color: var(--sus); }

  /* Long-range edge indicator */
  .long-edge-badge {
    position: absolute; top: -6px; left: 10px;
    font-size: 8px; background: var(--tfm); color: #fff;
    padding: 1px 5px; border-radius: 8px; letter-spacing: .04em;
  }
</style>
</head>
<body>

<div class="header">
  <h1>EnergyAbs Flow</h1>
  <div class="sub">磐井の乱（527年）→ 律令国家志向の実質的消滅（1100s）— 39ノード・50エッジの有向グラフ</div>
</div>

<div class="controls" id="controls"></div>

<div class="graph-wrap">
  <div class="graph" id="graph">
    <div class="clusters" id="clusters"></div>
    <svg class="edge-layer" id="edgeSvg"></svg>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ─── Data (loaded async) ───
let graph = null;

// ─── Config ───
// clusterOrder is derived from data after load

const roleColors = {
  amplifies: { color: 'var(--amp)', label: 'amplifies（増幅）' },
  triggers:  { color: 'var(--trg)', label: 'triggers（引き金）' },
  transforms:{ color: 'var(--tfm)', label: 'transforms（転化）' },
  sustains:  { color: 'var(--sus)', label: 'sustains（維持）' },
  suppresses:{ color: 'var(--sup)', label: 'suppresses（抑制）' },
  inherits:  { color: 'var(--inh)', label: 'inherits（継承）' }
};

let eventNodes = new Set();
let nodeMap = new Map();
let clusterOrder = [];
const activeRoles = new Set(Object.keys(roleColors));
let selectedNode = null;

// ─── Build Controls ───
function buildControls() {
  const ctrl = document.getElementById('controls');
  Object.entries(roleColors).forEach(([role, cfg]) => {
    const lbl = document.createElement('label');
    lbl.className = 'active';
    lbl.dataset.role = role;
    lbl.innerHTML = `<input type="checkbox" checked><span class="legend-dot" style="background:${cfg.color}"></span>${cfg.label}`;
    lbl.addEventListener('click', () => {
      const inp = lbl.querySelector('input');
      // toggle will happen after this handler
      setTimeout(() => {
        if (inp.checked) { activeRoles.add(role); lbl.classList.add('active'); }
        else { activeRoles.delete(role); lbl.classList.remove('active'); }
        updateEdgeVisibility();
      }, 0);
    });
    ctrl.appendChild(lbl);
  });
  const stats = document.createElement('span');
  stats.className = 'stats';
  stats.textContent = `${graph.nodes.length} nodes · ${graph.edges.length} edges`;
  ctrl.appendChild(stats);
}

// ─── Render Clusters ───
function renderClusters() {
  const container = document.getElementById('clusters');
  clusterOrder.forEach(c => {
    const row = document.createElement('div');
    row.className = 'cluster-row';
    row.innerHTML = `<div class="cluster-label">${c.label}<span class="cl-era">${c.era}</span></div>`;
    const nodesDiv = document.createElement('div');
    nodesDiv.className = 'cluster-nodes';

    const clusterNodes = graph.nodes.filter(n => n.cluster === c.id);
    clusterNodes.forEach(n => {
      const card = document.createElement('div');
      card.className = 'node' + (eventNodes.has(n.id) ? ' event' : '');
      card.dataset.id = n.id;
      let html = `<div class="node-int ${n.intensity}"></div>`;
      html += `<div class="node-era">${n.era}</div>`;
      html += `<div class="node-label">${n.label}</div>`;
      if (n.pattern) html += `<div class="node-pattern">${n.pattern}</div>`;
      html += `<div class="node-id">${n.id}</div>`;
      card.innerHTML = html;

      card.addEventListener('mouseenter', (e) => showTooltip(n, e));
      card.addEventListener('mousemove', (e) => moveTooltip(e));
      card.addEventListener('mouseleave', hideTooltip);
      card.addEventListener('click', () => toggleSelect(n.id));
      nodesDiv.appendChild(card);
    });
    row.appendChild(nodesDiv);
    container.appendChild(row);
  });
}

// ─── Draw Edges ───
function drawEdges() {
  const svg = document.getElementById('edgeSvg');
  const graphEl = document.getElementById('graph');
  const graphRect = graphEl.getBoundingClientRect();

  // Size SVG to match graph
  svg.style.width = graphEl.scrollWidth + 'px';
  svg.style.height = graphEl.scrollHeight + 'px';
  svg.setAttribute('viewBox', `0 0 ${graphEl.scrollWidth} ${graphEl.scrollHeight}`);

  // Arrow markers
  let defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  Object.entries(roleColors).forEach(([role, cfg]) => {
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', `arrow-${role}`);
    marker.setAttribute('viewBox', '0 0 10 10');
    marker.setAttribute('refX', '9');
    marker.setAttribute('refY', '5');
    marker.setAttribute('markerWidth', '5');
    marker.setAttribute('markerHeight', '5');
    marker.setAttribute('orient', 'auto');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', '0,1 10,5 0,9');
    // Use actual color values
    const temp = document.createElement('div');
    temp.style.color = cfg.color;
    document.body.appendChild(temp);
    const realColor = getComputedStyle(temp).color;
    document.body.removeChild(temp);
    poly.setAttribute('fill', realColor);
    marker.appendChild(poly);
    defs.appendChild(marker);
  });
  svg.appendChild(defs);

  graph.edges.forEach(e => {
    const fromEl = document.querySelector(`[data-id="${e.from}"]`);
    const toEl = document.querySelector(`[data-id="${e.to}"]`);
    if (!fromEl || !toEl) return;

    const fRect = fromEl.getBoundingClientRect();
    const tRect = toEl.getBoundingClientRect();
    const sx = fRect.left + fRect.width / 2 - graphRect.left;
    const sy = fRect.bottom - graphRect.top;
    const tx = tRect.left + tRect.width / 2 - graphRect.left;
    const ty = tRect.top - graphRect.top;

    // Determine if it's a long-range edge
    const dy = ty - sy;
    const dx = tx - sx;
    const isLong = dy > 600;

    let d;
    if (dy > 20) {
      // Normal downward edge
      const cpOffset = Math.min(dy * 0.4, 120);
      if (isLong) {
        // Route around the side for very long edges
        const side = sx < graphEl.scrollWidth / 2 ? -60 : 60;
        d = `M${sx},${sy} C${sx + side},${sy + cpOffset} ${tx + side},${ty - cpOffset} ${tx},${ty}`;
      } else {
        d = `M${sx},${sy} C${sx},${sy + cpOffset} ${tx},${ty - cpOffset} ${tx},${ty}`;
      }
    } else {
      // Same-row or upward (shouldn't happen much)
      const midY = (sy + ty) / 2 - 40;
      d = `M${sx},${sy} C${sx},${midY} ${tx},${midY} ${tx},${ty}`;
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('marker-end', `url(#arrow-${e.role})`);
    path.classList.add('edge', e.role);
    path.dataset.id = e.id;
    path.dataset.from = e.from;
    path.dataset.to = e.to;
    path.dataset.role = e.role;
    svg.appendChild(path);
  });
}

// ─── Tooltip ───
function showTooltip(node, e) {
  if (selectedNode) return;
  highlightConnected(node.id);
  const tt = document.getElementById('tooltip');
  const inEdges = graph.edges.filter(ed => ed.to === node.id);
  const outEdges = graph.edges.filter(ed => ed.from === node.id);
  let html = `<h4>${node.label}</h4>`;
  html += `<div class="t-summary">${node.summary}</div>`;
  if (node.actors.length) html += `<div class="t-actors">主体: ${node.actors.join('、')}</div>`;
  if (inEdges.length || outEdges.length) {
    html += `<div class="t-edges">`;
    inEdges.forEach(ed => {
      const src = nodeMap.get(ed.from);
      html += `<div class="t-edge-item">← <span class="t-role ${ed.role}">${ed.role}</span> ${src ? src.label : ed.from}</div>`;
    });
    outEdges.forEach(ed => {
      const tgt = nodeMap.get(ed.to);
      html += `<div class="t-edge-item">→ <span class="t-role ${ed.role}">${ed.role}</span> ${tgt ? tgt.label : ed.to}</div>`;
    });
    html += `</div>`;
  }
  tt.innerHTML = html;
  tt.classList.add('show');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  const x = Math.min(e.clientX + 16, window.innerWidth - 360);
  const y = Math.min(e.clientY + 16, window.innerHeight - tt.offsetHeight - 20);
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  if (selectedNode) return;
  document.getElementById('tooltip').classList.remove('show');
  clearHighlight();
}

// ─── Selection ───
function toggleSelect(id) {
  if (selectedNode === id) {
    selectedNode = null;
    clearHighlight();
    document.getElementById('tooltip').classList.remove('show');
  } else {
    selectedNode = id;
    highlightConnected(id);
    const node = nodeMap.get(id);
    showTooltip(node, { clientX: 100, clientY: 100 });
    // Position tooltip to the right
    const tt = document.getElementById('tooltip');
    tt.style.left = (window.innerWidth - 370) + 'px';
    tt.style.top = '80px';
  }
}

// ─── Highlight ───
function highlightConnected(nodeId) {
  const connectedNodes = new Set([nodeId]);
  const connectedEdges = new Set();

  graph.edges.forEach(e => {
    if (e.from === nodeId || e.to === nodeId) {
      connectedEdges.add(e.id);
      connectedNodes.add(e.from);
      connectedNodes.add(e.to);
    }
  });

  document.querySelectorAll('.node').forEach(el => {
    el.classList.toggle('hl', connectedNodes.has(el.dataset.id));
    el.classList.toggle('dim', !connectedNodes.has(el.dataset.id));
  });
  document.querySelectorAll('.edge').forEach(el => {
    el.classList.toggle('hl', connectedEdges.has(el.dataset.id));
    el.classList.toggle('dim', !connectedEdges.has(el.dataset.id));
  });
}

function clearHighlight() {
  document.querySelectorAll('.node').forEach(el => { el.classList.remove('hl', 'dim'); });
  document.querySelectorAll('.edge').forEach(el => { el.classList.remove('hl', 'dim'); });
}

function updateEdgeVisibility() {
  document.querySelectorAll('.edge').forEach(el => {
    const role = el.dataset.role;
    el.style.display = activeRoles.has(role) ? '' : 'none';
  });
}

// ─── Init ───
async function init() {
  const res = await fetch('../data/energyabs_v2.json');
  graph = await res.json();
  nodeMap = new Map(graph.nodes.map(n => [n.id, n]));

  // Derive clusterOrder from data (sorted by first node appearance)
  const clusterMap = new Map();
  graph.nodes.forEach((n, i) => {
    if (!clusterMap.has(n.cluster)) {
      const parts = n.cluster.split('_');
      const prefix = parts[0];
      const label = parts.slice(1).join('_') || parts[0];
      clusterMap.set(n.cluster, { id: n.cluster, label, era: n.era, order: i });
    }
  });
  // Chronological order: P0 → 0 → A-O → P → Q-W
  const clusterSortKey = id => {
    const prefix = id.split('_')[0];
    if (prefix === 'P0') return '00';
    if (/^\d/.test(prefix)) return '01_' + prefix;
    return prefix;
  };
  clusterOrder = [...clusterMap.values()].sort((a, b) =>
    clusterSortKey(a.id).localeCompare(clusterSortKey(b.id))
  );

  // Mark event nodes (those with pattern field)
  eventNodes = new Set(graph.nodes.filter(n => n.pattern).map(n => n.id));

  buildControls();
  renderClusters();
  requestAnimationFrame(() => requestAnimationFrame(drawEdges));
}
init();

// Redraw on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const svg = document.getElementById('edgeSvg');
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    drawEdges();
  }, 200);
});
</script>
</body>
</html>
