<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>パターン・ランゲージ ― 住まいの空間体験（15パターン・18エッジ）</title>
<style>
  :root {
    --bg: #f0ebe0;
    --paper: #fffdf8;
    --ink: #28231e;
    --muted: #6a6058;
    --line: #c9b89e;
    --accent: #3a5c3a;
    --shadow: 0 6px 20px rgba(40,28,14,.08);
    --block-w: 380px;
    --block-radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
    background: linear-gradient(160deg, #f5efe3 0%, #ede5d5 100%);
    color: var(--ink);
    min-height: 100vh;
  }
  .page { max-width: 1600px; margin: 0 auto; padding: 24px 20px 80px; }
  .header { margin-bottom: 12px; border-left: 4px solid var(--accent); padding-left: 16px; }
  h1 { font-size: 22px; color: var(--accent); letter-spacing: .06em; }
  .sub { margin-top: 3px; font-size: 12px; color: var(--muted); }

  /* Page-specific: scale filter */
  .scale-filters { display: flex; gap: 6px; margin-left: 12px; padding-left: 12px; border-left: 2px solid var(--line); }
  .scale-btn {
    font-family: inherit; font-size: 11px; padding: 3px 10px;
    border: 1.5px solid var(--line); border-radius: 12px;
    background: var(--paper); color: var(--muted); cursor: pointer; transition: all .2s;
  }
  .scale-btn:hover { opacity: 0.8; }
  .scale-btn.active { color: #fff; }
  .scale-btn[data-scale="region"].active { background: #1a3a5c; border-color: #1a3a5c; }
  .scale-btn[data-scale="building"].active { background: #3d5a3e; border-color: #3d5a3e; }
  .scale-btn[data-scale="room"].active { background: #5c4a20; border-color: #5c4a20; }
  .scale-btn[data-scale="detail"].active { background: #5c3020; border-color: #5c3020; }

  /* Page-specific: tier labels */
  .tier-row {
    display: flex; align-items: center; gap: 12px;
    margin: 16px 0 6px; padding: 0 4px;
    position: relative; z-index: 3;
  }
  .tier-row:first-child { margin-top: 0; }
  .tier-label {
    font-size: 11px; font-weight: 700; letter-spacing: .08em;
    padding: 3px 10px; border-radius: 10px; color: #fff;
    white-space: nowrap; flex-shrink: 0;
  }
  .tier-line { flex: 1; height: 1px; opacity: 0.25; }

  /* Page-specific: scale badge + hl color */
  .scale-badge {
    font-size: 9px; padding: 1px 6px; border-radius: 8px;
    color: #fff; font-weight: 600; letter-spacing: .05em;
  }
  .scale-badge.region { background: #1a3a5c; }
  .scale-badge.building { background: #3d5a3e; }
  .scale-badge.room { background: #5c4a20; }
  .scale-badge.detail { background: #5c3020; }
  .block.hl { box-shadow: 0 0 0 5px rgba(58,92,58,.25); }

  /* Legend */
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: var(--muted);
    margin-bottom: 16px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-sw { width: 28px; height: 3px; border-radius: 2px; }

  @media (max-width: 840px) {
    :root { --block-w: 100%; }
    .block { max-width: 460px; }
  }
</style>
</head>
<body>
<div class="page">
  <nav id="page-nav"></nav>
  <div class="header">
    <h1>パターン・ランゲージ ― 住まいの空間体験</h1>
    <p class="sub">C. アレグザンダー『パターン・ランゲージ』(1977) から住居スケールの15パターンを抽出 ― 15ノード・18エッジ</p>
    <p class="sub">大きなパターンが小さなパターンの文脈を形成する ― 上から下へスケールが縮小し、上流が下流の「前提条件」を作る。ノードをクリックで文脈（上流）と詳細化（下流）の関係を確認</p>
  </div>

  <div class="controls">
    <button class="active" onclick="resetView(this)">全表示</button>
    <button onclick="filterRole('amplifies',this)">amplifies</button>
    <button onclick="filterRole('triggers',this)">triggers</button>
    <button onclick="filterRole('sustains',this)">sustains</button>
    <button onclick="filterRole('inherits',this)">inherits</button>
    <div class="scale-filters">
      <button class="scale-btn active" data-scale="all" onclick="filterScale('all',this)">全スケール</button>
      <button class="scale-btn" data-scale="region" onclick="filterScale('region',this)">地域</button>
      <button class="scale-btn" data-scale="building" onclick="filterScale('building',this)">建物</button>
      <button class="scale-btn" data-scale="room" onclick="filterScale('room',this)">部屋</button>
      <button class="scale-btn" data-scale="detail" onclick="filterScale('detail',this)">ディテール</button>
    </div>
    <span class="ctrl-info" id="info">15ノード / 18エッジ</span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-sw" style="background:#3a6a9a"></div>institution</div>
    <div class="legend-item"><div class="legend-sw" style="background:#5a8a5a"></div>drift</div>
    <div class="legend-item"><div class="legend-sw" style="background:#6a3a8a"></div>power</div>
    <div class="legend-item"><div class="legend-sw" style="background:#3a7a8a"></div>reform</div>
    <div class="legend-item"><div class="legend-sw" style="background:#c47a3a"></div>shock</div>
    <span style="margin-left: 16px; border-left: 2px solid #ddd; padding-left: 12px;">エッジ:</span>
    <div class="legend-item"><div class="legend-sw" style="background:#c45a3c"></div>triggers</div>
    <div class="legend-item"><div class="legend-sw" style="background:#c8960a"></div>amplifies</div>
    <div class="legend-item"><div class="legend-sw" style="background:#3a8a3a"></div>sustains</div>
    <div class="legend-item"><div class="legend-sw" style="background:#3a7a8a"></div>inherits</div>
  </div>

  <div class="canvas" id="canvas">
    <svg id="edge-svg"></svg>
  </div>
</div>

<script src="shared.js"></script>
<script>
// ===================== DATA =====================
let DATA = null;

async function loadData() {
  const res = await fetch('../data/pattern_language_sample.json');
  const json = await res.json();
  DATA = { nodes: json.nodes, edges: json.edges };
  buildGraph();
}

// ===================== LAYOUT =====================
const LAYOUT = [
  { tier: '地域', tierColor: '#1a3a5c', ids: ["P037"] },
  { ids: ["P061", "P079"] },
  { tier: '建物', tierColor: '#3d5a3e', ids: ["P053", "P104", "P106"] },
  { ids: ["P110", "P112"] },
  { tier: '部屋', tierColor: '#5c4a20', ids: ["P127", "P131", "P134"] },
  { tier: 'ディテール', tierColor: '#5c3020', ids: ["P159", "P180"] },
  { ids: ["P201", "P252"] },
];

const SCALE_MAP = {
  "P037": "region", "P053": "region", "P061": "region",
  "P079": "building", "P104": "building", "P106": "building",
  "P110": "building", "P112": "building",
  "P127": "room", "P131": "room", "P134": "room",
  "P159": "room", "P180": "detail",
  "P201": "detail", "P252": "detail"
};
const SCALE_LABELS = { region: '地域', building: '建物', room: '部屋', detail: 'ディテール' };

let nodeMap = {};
let _inEdges = {};
let _outEdges = {};
const canvasEl = document.getElementById('canvas');
const svgEl = document.getElementById('edge-svg');
const blockEls = {};

const blockOpts = {
  nodeMap: null,
  chipMaxLen: 14,
  emptyLabel: '（起点）',
  eraBadge: n => `<span class="scale-badge ${SCALE_MAP[n.id] || 'building'}">${SCALE_LABELS[SCALE_MAP[n.id]] || ''}</span>`,
  onChipClick: 'flashAndScroll',
  onChipHover: true,
};

function buildGraph() {
  nodeMap = {};
  DATA.nodes.forEach(n => nodeMap[n.id] = n);
  blockOpts.nodeMap = nodeMap;
  _inEdges = {}; _outEdges = {};
  DATA.nodes.forEach(n => { _inEdges[n.id] = []; _outEdges[n.id] = []; });
  DATA.edges.forEach(e => { _inEdges[e.to].push(e); _outEdges[e.from].push(e); });

  LAYOUT.forEach(rowDef => {
    if (rowDef.tier) {
      const tierEl = document.createElement('div');
      tierEl.className = 'tier-row';
      tierEl.innerHTML = `<span class="tier-label" style="background:${rowDef.tierColor}">${rowDef.tier}</span><div class="tier-line" style="background:${rowDef.tierColor}"></div>`;
      canvasEl.appendChild(tierEl);
    }
    const rowEl = document.createElement('div');
    rowEl.className = 'block-row';
    rowDef.ids.forEach(id => {
      const n = nodeMap[id];
      if (!n) return;
      const block = document.createElement('div');
      block.className = 'block';
      block.dataset.id = id;
      block.dataset.scale = SCALE_MAP[id] || 'building';
      block.id = 'blk-' + id;
      block.style.borderColor = (FW_TYPE_STYLES[n.fwType] || {}).color || '#b8a898';
      block.innerHTML = `<div class="block-body">${renderBlockHTML(n, _inEdges[id], _outEdges[id], blockOpts)}</div>${renderBlockFooter(n)}`;
      block.addEventListener('click', () => toggleHighlight(id));
      blockEls[id] = block;
      rowEl.appendChild(block);
    });
    canvasEl.appendChild(rowEl);
  });
  requestAnimationFrame(drawEdges);
}

function drawEdges() {
  drawEdgesStandard(DATA.edges, blockEls, canvasEl, svgEl);
}

// ===================== HIGHLIGHT =====================
let hlId = null;
function toggleHighlight(id) {
  if (hlId === id) { hlId = null; resetView(document.querySelector('.controls button')); return; }
  hlId = id;
  const connected = new Set([id]);
  DATA.edges.forEach(e => {
    if (e.from === id) connected.add(e.to);
    if (e.to === id) connected.add(e.from);
  });
  Object.entries(blockEls).forEach(([bid, el]) => {
    el.classList.toggle('hl', bid === id);
    el.classList.toggle('dim', !connected.has(bid));
  });
  document.querySelectorAll(EDGE_SEL).forEach(el => {
    const hit = el.dataset.from === id || el.dataset.to === id;
    el.classList.toggle('hl', hit); el.classList.toggle('dim', !hit);
  });
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
}

function resetView(btn) {
  hlId = null;
  Object.values(blockEls).forEach(el => { el.classList.remove('hl', 'dim'); el.style.display = ''; });
  document.querySelectorAll(EDGE_SEL).forEach(el => { el.classList.remove('hl', 'dim'); });
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.scale-btn[data-scale="all"]').classList.add('active');
  if (btn) btn.classList.add('active');
}

function filterRole(role, btn) {
  hlId = null;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const involved = new Set();
  DATA.edges.forEach(e => { if (e.role === role) { involved.add(e.from); involved.add(e.to); } });
  Object.entries(blockEls).forEach(([id, el]) => {
    el.classList.toggle('dim', !involved.has(id)); el.classList.remove('hl');
  });
  document.querySelectorAll(EDGE_SEL).forEach(el => {
    const hit = el.dataset.role === role;
    el.classList.toggle('hl', hit); el.classList.toggle('dim', !hit);
  });
}

function filterScale(scale, btn) {
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (scale === 'all') {
    Object.values(blockEls).forEach(el => { el.classList.remove('dim'); el.style.display = ''; });
    document.querySelectorAll(EDGE_SEL).forEach(el => el.classList.remove('dim'));
    return;
  }
  const inScale = new Set();
  Object.entries(SCALE_MAP).forEach(([id, s]) => { if (s === scale) inScale.add(id); });
  Object.entries(blockEls).forEach(([id, el]) => {
    el.classList.toggle('dim', !inScale.has(id)); el.classList.remove('hl');
  });
  document.querySelectorAll(EDGE_SEL).forEach(el => {
    const hit = inScale.has(el.dataset.from) || inScale.has(el.dataset.to);
    el.classList.toggle('dim', !hit); el.classList.remove('hl');
  });
}

window.addEventListener('resize', () => requestAnimationFrame(drawEdges));
loadData();
</script>
</body>
</html>
